<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Radical Clock</title>
    
    <!-- Error Trapping Script (Runs before anything else) -->
    <script>
      window.onerror = function(msg, url, line, col, error) {
        var loader = document.getElementById('loader');
        if (loader) {
          loader.innerHTML = '<div style="background:red; color:white; padding:20px; text-align:left; font-family:monospace; font-size:14px;">' +
            '<strong>CRITICAL ERROR</strong><br>' + 
            msg + '<br>' +
            '<small>' + (url || 'unknown script') + ':' + line + '</small><br><br>' + 
            '<em>If network error: Connect Wifi and Reboot.</em>' +
            '</div>';
          document.body.style.backgroundColor = 'black'; // Ensure high contrast
        }
      };
      
      // Check for network immediately
      if (!navigator.onLine) {
        window.onload = function() {
           var loader = document.getElementById('loader');
           if (loader) loader.innerHTML += '<br><strong style="color:orange">⚠ WARNING: NO INTERNET DETECTED. APP MAY FAIL TO LOAD.</strong>';
        }
      }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              'vcr': ['"VT323"', 'monospace'],
              'pixel': ['"Press Start 2P"', 'cursive'],
            },
            colors: {
              'neon-pink': '#ff00ff',
              'neon-blue': '#00ffff',
              'neon-green': '#39ff14',
              'deep-purple': '#240046',
            },
            animation: {
              'blob': 'blob 10s infinite',
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'grid-scroll': 'grid-scroll 1s linear infinite',
              'twinkle': 'twinkle 4s ease-in-out infinite',
              'rise-set': 'rise-set 10s ease-in-out infinite alternate',
              'wave-slow': 'wave 20s linear infinite',
              'wave-slower': 'wave 30s linear infinite reverse',
              'rabbit-wander': 'wander 20s linear infinite',
              'rabbit-breath': 'breath 3s ease-in-out infinite',
              'rabbit-bounce': 'bounce-wild 0.5s infinite',
              'float-up': 'float-up 2s linear infinite',
              'disco': 'disco 2s linear infinite',
              'spin-slow': 'spin 240s linear infinite',
            },
            keyframes: {
              blob: {
                '0%': { transform: 'translate(0px, 0px) scale(1)' },
                '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                '100%': { transform: 'translate(0px, 0px) scale(1)' },
              },
              'grid-scroll': {
                '0%': { backgroundPosition: '0 0' },
                '100%': { backgroundPosition: '0 40px' },
              },
              'twinkle': {
                '0%, 100%': { opacity: '0.8', transform: 'scale(1)' },
                '50%': { opacity: '0.3', transform: 'scale(0.8)' },
              },
              'rise-set': {
                '0%': { transform: 'translateY(0)' },
                '100%': { transform: 'translateY(-10px)' },
              },
              'wave': {
                '0%': { transform: 'translateX(0)' },
                '100%': { transform: 'translateX(-50%)' },
              },
              'wander': {
                '0%': { transform: 'translateX(-120%) scaleX(1)' },
                '45%': { transform: 'translateX(20vw) scaleX(1)' },
                '50%': { transform: 'translateX(20vw) scaleX(-1)' },
                '95%': { transform: 'translateX(-120%) scaleX(-1)' },
                '100%': { transform: 'translateX(-120%) scaleX(1)' },
              },
              'breath': {
                '0%, 100%': { transform: 'scaleY(1)' },
                '50%': { transform: 'scaleY(0.95)' },
              },
              'bounce-wild': {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-20px)' },
              },
              'float-up': {
                '0%': { transform: 'translateY(0) translateX(0)', opacity: '0' },
                '20%': { opacity: '1' },
                '100%': { transform: 'translateY(-40px) translateX(10px)', opacity: '0' },
              },
              'disco': {
                '0%': { filter: 'hue-rotate(0deg)' },
                '100%': { filter: 'hue-rotate(360deg)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #000 !important; /* Force black immediately */
        color: #39ff14; /* Neon green text */
        overflow: hidden; 
        user-select: none;
        -webkit-user-select: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: none; 
        cursor: none; 
        margin: 0;
        height: 100vh;
        width: 100vw;
      }
      #loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        font-family: 'Courier New', monospace;
        text-align: center;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.35.0"
  }
}
</script>
</head>
  <body>
    <div id="root">
        <div id="loader">
            <h1 style="font-size: 2rem; margin-bottom: 1rem;">SYSTEM BOOT</h1>
            <p>CONNECTING TO NETWORK...</p>
            <p style="font-size: 0.8rem; opacity: 0.7; margin-top: 2rem;">If stuck here: Check Wifi</p>
            <!-- Hidden Debug info -->
            <div id="debug-info" style="display:none; color: gray; font-size: 10px; margin-top: 20px;"></div>
        </div>
    </div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
